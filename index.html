<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BrianKle</title>
    <style>
        :root {
            --bg-color: #121213;
            --tile-bg: #121213;
            --tile-border: #3a3a3c;
            --correct: #538d4e;
            --present: #b59f3b;
            --absent: #3a3a3c;
            --text-main: #ffffff;
            --panel-bg: #1a1a1b;
            --panel-border: #2f2f30;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            overflow-x: hidden;
            touch-action: manipulation; 
        }

        header {
            text-align: center;
            border-bottom: 1px solid var(--panel-border);
            width: 100%;
            max-width: 1400px;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: 3px;
        }

        .sub-header {
            font-size: 0.9rem;
            color: #818384;
            margin: 5px 0 0 0;
            font-weight: 500;
        }

        .sub-header span {
            color: var(--correct);
            font-weight: bold;
        }

        .layout {
            display: flex;
            width: 100%;
            max-width: 1400px;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            flex-grow: 1;
        }

        .side-panel {
            width: 280px;
            background-color: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 20px;
            box-sizing: border-box;
        }

        .side-panel h2 {
            font-size: 1.15rem;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #818384;
        }

        .quote-box {
            margin-bottom: 15px;
            font-style: italic;
            border-left: 4px solid var(--correct);
            padding-left: 12px;
            font-size: 0.95rem;
        }

        .quote-author {
            display: block;
            font-style: normal;
            font-weight: bold;
            font-size: 0.85rem;
            color: #818384;
            margin-top: 4px;
            text-align: right;
        }

        .social-link, .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text-main);
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            background: #252526;
            transition: background 0.2s, transform 0.2s;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        .social-link:hover, .action-btn:hover {
            background: #333335;
            transform: translateY(-2px);
        }

        .action-btn {
            background: var(--correct);
            margin-top: 15px;
        }

        .action-btn:hover {
            background: #43733f;
        }

        .social-link svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            box-sizing: border-box;
        }

        .game-area.mode-6 {
            max-width: 460px;
        }

        .game-area.mode-16 {
            max-width: 100%;
        }

        #board {
            display: grid;
            gap: 5px;
            width: 100%;
            justify-content: center;
            box-sizing: border-box;
            grid-template-columns: repeat(5, 60px); /* Added standard Wordle columns */
            grid-template-rows: repeat(6, 60px);
        }

        /* FIXED & CLOSED THIS SECTION */
        .tile {
            border: 3px solid var(--tile-border);
            background-color: var(--tile-bg);
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            box-sizing: border-box;
            user-select: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>BrianKle</h1>
        <p class="sub-header">A custom <span>Wordle</span> clone</p>
    </header>

    <div class="layout">
        <aside class="side-panel">
            <h2>Stats & Info</h2>
            <div class="quote-box">
                "The code is mightier than the sword."
                <span class="quote-author">- Anonymous</span>
            </div>
            <button class="action-btn">New Game</button>
        </aside>

        <main class="game-area mode-6">
            <div id="board">
                <div class="tile">B</div>
                <div class="tile">R</div>
                <div class="tile">I</div>
                <div class="tile">A</div>
                <div class="tile">N</div>
                
                </div>
        </main>
    </div>

</body>
</html>
