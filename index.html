<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BrianKle</title>
    <style>
        :root {
            --bg-color: #121213;
            --tile-bg: #121213;
            --tile-border: #3a3a3c;
            --correct: #538d4e;
            --present: #b59f3b;
            --absent: #3a3a3c;
            --text-main: #ffffff;
            --panel-bg: #1a1a1b;
            --panel-border: #2f2f30;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            -webkit-text-size-adjust: 100%;
        }

        header {
            text-align: center;
            border-bottom: 1px solid var(--panel-border);
            width: 100%;
            max-width: 1200px;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        h1 {
            margin: 0 0 5px 0;
            font-size: 2.2rem;
            letter-spacing: 2px;
        }

        .chance-indicator {
            font-size: 1rem;
            color: var(--present);
            font-weight: bold;
            margin-bottom: 10px;
        }

        .mode-btn {
            background-color: var(--correct);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            margin-bottom: 5px;
        }

        .mode-btn:hover {
            background-color: #43733f;
        }

        .mode-btn:active {
            transform: scale(0.98);
        }

        .layout {
            display: flex;
            width: 100%;
            max-width: 1200px;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            flex-grow: 1;
        }

        .side-panel {
            width: 250px;
            background-color: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 20px;
            box-sizing: border-box;
        }

        .side-panel h2 {
            font-size: 1.1rem;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #818384;
        }

        .quote-box {
            margin-bottom: 15px;
            font-style: italic;
            border-left: 3px solid var(--correct);
            padding-left: 10px;
            font-size: 0.9rem;
        }

        .quote-author {
            display: block;
            font-style: normal;
            font-weight: bold;
            font-size: 0.8rem;
            color: #818384;
            margin-top: 5px;
            text-align: right;
        }

        .social-link {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
            text-decoration: none;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            background: #252526;
            transition: background 0.2s, transform 0.2s;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .social-link:hover {
            background: #333335;
            transform: translateY(-2px);
        }

        .social-link svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 600px;
        }

        #board {
            display: grid;
            gap: 5px;
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
        }

        .grid-6 {
            grid-template-columns: repeat(6, 1fr);
            max-width: 330px;
        }

        .grid-16 {
            grid-template-columns: repeat(16, 1fr);
            max-width: 100%;
            gap: 3px !important;
        }

        .tile {
            aspect-ratio: 1/1;
            border: 2px solid var(--tile-border);
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            user-select: none;
            transition: background-color 0.3s, border-color 0.3s;
            box-sizing: border-box;
        }

        .grid-16 .tile {
            font-size: 0.8rem;
            border-width: 1px;
        }

        .tile.active {
            border-color: #565758;
        }

        #message {
            background-color: #ffffff;
            color: #000000;
            padding: 12px 20px;
            border-radius: 5px;
            font-weight: bold;
            position: fixed;
            top: 12%;
            z-index: 10;
            display: none;
            box-shadow: 0 4px 23px rgba(0,0,0,0.5);
        }

        #keyboard {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 15px; /* Added separation spacing below grid */
        }

        .row {
            display: flex;
            justify-content: center;
            gap: 4px;
        }

        .key {
            background-color: #818384;
            color: white;
            border: 0;
            padding: 14px 0;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
            font-weight: bold;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .key.wide {
            flex: 1.5;
            font-size: 0.75rem;
        }

        .correct {
            background-color: var(--correct) !important;
            border-color: var(--correct) !important;
        }
        .present {
            background-color: var(--present) !important;
            border-color: var(--present) !important;
        }
        .absent {
            background-color: var(--absent) !important;
            border-color: var(--absent) !important;
        }

        footer {
            margin-top: 40px;
            padding-top: 25px;
            padding-bottom: 20px;
            border-top: 3px solid var(--panel-border);
            width: 100%;
            max-width: 1200px;
            text-align: center;
            font-size: 1.6rem; /* Enlarged credit footer visibility */
            color: #ffffff;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        footer a {
            color: #79d273;
            text-decoration: none;
            margin: 0 5px;
            border-bottom: 2px dashed #79d273;
            transition: color 0.2s, background-color 0.2s;
            padding: 2px 6px;
            border-radius: 4px;
        }

        footer a:hover {
            color: #ffffff;
            background-color: var(--correct);
            border-bottom-style: solid;
        }

        @media (max-width: 900px) {
            .layout {
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }
            .side-panel {
                width: 100%;
                max-width: 500px;
            }
            .side-panel:first-of-type {
                order: 2;
            }
            .side-panel:last-of-type {
                order: 3;
            }
            .game-area {
                order: 1;
            }
            h1 {
                font-size: 1.8rem;
            }
            .tile {
                font-size: 1.3rem;
            }
            .grid-16 .tile {
                font-size: 0.55rem;
                border-width: 1px;
            }
            .key {
                padding: 16px 0;
                font-size: 0.8rem;
            }
            footer {
                font-size: 1.25rem;
                margin-top: 25px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>BrianKle</h1>
        <div id="chanceText" class="chance-indicator">25% Chance of being BRIANK!</div>
        <button id="modeToggle" class="mode-btn">Play 16-Letter Version</button>
    </header>

    <div id="message"></div>

    <div class="layout">
        <aside class="side-panel">
            <h2>Brian's World</h2>
            <div id="quotesContainer"></div>
        </aside>

        <main class="game-area">
            <div id="board"></div>

            <div id="keyboard">
                <div class="row">
                    <button class="key" data-key="q">q</button>
                    <button class="key" data-key="w">w</button>
                    <button class="key" data-key="e">e</button>
                    <button class="key" data-key="r">r</button>
                    <button class="key" data-key="t">t</button>
                    <button class="key" data-key="y">y</button>
                    <button class="key" data-key="u">u</button>
                    <button class="key" data-key="i">i</button>
                    <button class="key" data-key="o">o</button>
                    <button class="key" data-key="p">p</button>
                </div>
                <div class="row">
                    <button class="key" data-key="a">a</button>
                    <button class="key" data-key="s">s</button>
                    <button class="key" data-key="d">d</button>
                    <button class="key" data-key="f">f</button>
                    <button class="key" data-key="g">g</button>
                    <button class="key" data-key="h">h</button>
                    <button class="key" data-key="j">j</button>
                    <button class="key" data-key="k">k</button>
                    <button class="key" data-key="l">l</button>
                </div>
                <div class="row">
                    <button class="key wide" data-key="enter">ENTER</button>
                    <button class="key" data-key="z">z</button>
                    <button class="key" data-key="x">x</button>
                    <button class="key" data-key="c">c</button>
                    <button class="key" data-key="v">v</button>
                    <button class="key" data-key="b">b</button>
                    <button class="key" data-key="n">n</button>
                    <button class="key" data-key="m">m</button>
                    <button class="key wide" data-key="backspace">⌫</button>
                </div>
            </div>
        </main>

        <aside class="side-panel">
            <h2>Follow Brian K</h2>

                </svg>
                TikTok

            <a href="https://www.youtube.com/@Briank_fromtiktok" target="_blank" class="social-link">
                <svg viewBox="0 0 24 24">

    </div>

    <footer>
        Made by 
        YouTube: <a href="https://www.youtube.com/@FrontOfficeFeed" target="_blank">@FrontOfficeFeed</a> | 
        Instagram: <a href="https://www.instagram.com/frontofficefeed" target="_blank">@frontofficefeed</a>

    <script>
        const targetWords6 = [
            "CODING", "GAMING", "LEGEND", "CHAMPS", "PLAYER", "WINNER", 
            "SYSTEM", "ONLINE", "FRIEND", "BEASTS", "CYPHER", "MATRIX", 
            "COSMOS", "LAUNCH", "PLANET", "FLIGHT", "SHADOW", "STRIKE"
        ];

        const targetWords16 = [
            "RECHARACTERIZING", "UNSUCCESSFULNESS", "COMPREHENSIVENESS", "COUNTERREVOLUTION",
            "MISREPRESENTATION", "INTERDISCIPLINARY", "ENVIRONMENTALISTS", "INTERNATIONALIZATION"
        ];
        
        let isSixLetterMode = true; 
        let targetWord = "";
        let wordLength = 6;
        let maxGuesses = 6; 
        let currentGuess = "";
        let guesses = [];
        let gameOver = false;
        let isValidating = false;

        const baseQuotes = [
            { text: `"If you aren't guessing BRIANK first, what are you even doing?"`, author: "- Brian K" },
            { text: `"The 25% chance is real. Keep rolling the tiles!"`, author: "- The Fans" },
            { text: `"Legend has it, some grids were made just for him."`, author: "- Internet Lore" }
        ];

        // Fully updated with proper capitalization
        const specialQuote = { text: `"Will you need your spreadsheet lol?"`, author: "- The Chat" };

        function initGame() {
            currentGuess = "";
            guesses = [];
            gameOver = false;
            isValidating = false;
            hideMessage();
            resetKeyboardColors();

            const roll = Math.random();

            if (isSixLetterMode) {
                wordLength = 6;
                maxGuesses = 6; 
                document.getElementById('chanceText').textContent = "25% Chance of being BRIANK!";
                document.getElementById('modeToggle').textContent = "Play 16-Letter Version";
                
                if (roll < 0.25) {
                    targetWord = "BRIANK";
                } else {
                    targetWord = targetWords6[Math.floor(Math.random() * targetWords6.length)].toUpperCase();
                }
            } else {
                wordLength = 16;
                maxGuesses = 3; // Enforced 3-guess maximum limit
                document.getElementById('chanceText').textContent = "90% Chance of being BRIANKFROMTIKTOK!";
                document.getElementById('modeToggle').textContent = "Play 6-Letter Version";
                
                if (roll < 0.90) {
                    targetWord = "BRIANKFROMTIKTOK";
                } else {
                    targetWord = targetWords16[Math.floor(Math.random() * targetWords16.length)].toUpperCase();
                }
            }
            
            setupBoard();
            setupQuotes();
        }

        function setupBoard() {
            const board = document.getElementById('board');
            board.innerHTML = "";
            
            if (isSixLetterMode) {
                board.className = "grid-6";
            } else {
                board.className = "grid-16";
            }

            for (let i = 0; i < maxGuesses; i++) {
                for (let j = 0; j < wordLength; j++) {
                    const tile = document.createElement('div');
                    tile.classList.add('tile');
                    tile.setAttribute('id', `tile-${i}-${j}`);
                    board.appendChild(tile);
                }
            }
        }

        function setupQuotes() {
            const container = document.getElementById('quotesContainer');
            container.innerHTML = "";
            
            let activeQuotes = [...baseQuotes];
            if (!isSixLetterMode) {
                activeQuotes.push(specialQuote);
            }

            activeQuotes.forEach(q => {
                const box = document.createElement('div');
                box.className = 'quote-box';
                box.innerHTML = `${q.text} <span class="quote-author">${q.author}</span>`;
                container.appendChild(box);
            });
        }

        function showMessage(msg, duration = 2000) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = msg;
            messageEl.style.display = 'block';
            if (duration) {
                setTimeout(() => {
                    messageEl.style.display = 'none';
                }, duration);
            }
        }

        function hideMessage() {
            document.getElementById('message').style.display = 'none';
        }

        function handleKeyPress(key) {
            if (gameOver || isValidating) return;

            if (key === 'backspace') {
                currentGuess = currentGuess.slice(0, -1);
                updateRow();
            } else if (key === 'enter') {
                submitGuess();
            } else if (/^[a-zA-Z]$/.test(key)) {
                if (currentGuess.length < wordLength) {
                    currentGuess += key.toUpperCase();
                    updateRow();
                }
            }
        }

        function updateRow() {
            const rowIdx = guesses.length;
            for (let colIdx = 0; colIdx < wordLength; colIdx++) {
                const tile = document.getElementById(`tile-${rowIdx}-${colIdx}`);
                if (!tile) continue;
                const letter = currentGuess[colIdx] || "";
                tile.textContent = letter;
                if (letter) {
                    tile.classList.add('active');
                } else {
                    tile.classList.remove('active');
                }
            }
        }

        async function checkDictionary(word) {
            if (word === "BRIANK" || word === "BRIANKFROMTIKTOK") return true;
            
            try {
                const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word.toLowerCase()}`);
                return response.ok;
            } catch (error) {
                if (isSixLetterMode) {
                    return targetWords6.includes(word);
                } else {
                    return targetWords16.includes(word);
                }
            }
        }

        async function submitGuess() {
            if (currentGuess.length < wordLength) {
                showMessage("Not enough letters!");
                return;
            }

            isValidating = true;
            showMessage("Checking word...", 0);

            const guess = currentGuess;
            const wordIsValid = await checkDictionary(guess);
            
            hideMessage();
            isValidating = false;

            if (!wordIsValid) {
                showMessage("Not in word list!");
                return;
            }

            const rowIdx = guesses.length;
            guesses.push(guess);
            currentGuess = "";

            let targetLetters = targetWord.split('');

            for (let i = 0; i < wordLength; i++) {
                const tile = document.getElementById(`tile-${rowIdx}-${i}`);
                const letter = guess[i];
                
                if (letter === targetWord[i]) {
                    tile.classList.add('correct');
                    colorKeyboard(letter, 'correct');
                    targetLetters[i] = null; 
                }
            }

            for (let i = 0; i < wordLength; i++) {
                const tile = document.getElementById(`tile-${rowIdx}-${i}`);
                if (tile.classList.contains('correct')) continue;

                const letter = guess[i];
                const index = targetLetters.indexOf(letter);

                if (index !== -1) {
                    tile.classList.add('present');
                    colorKeyboard(letter, 'present');
                    targetLetters[index] = null;
                } else {
                    tile.classList.add('absent');
                    colorKeyboard(letter, 'absent');
                }
            }

            if (guess === targetWord) {
                if (targetWord === "BRIANK" || targetWord === "BRIANKFROMTIKTOK") {
                    showMessage(`👑 UNBELIEVABLE! You found ${targetWord}!`, null);
                } else {
                    showMessage("🎉 Brilliant! You got it.", null);
                }
                gameOver = true;
            } else if (guesses.length === maxGuesses) {
                showMessage(`Game over! The word was ${targetWord}`, null);
                gameOver = true;
            }
        }

        function colorKeyboard(letter, status) {
            const keys = document.querySelectorAll('.key');
            keys.forEach(key => {
                if (key.getAttribute('data-key') === letter.toLowerCase()) {
                    if (key.classList.contains('correct')) return;
                    if (key.classList.contains('present') && status === 'absent') return;
                    
                    key.classList.add(status);
                }
            });
        }

        function resetKeyboardColors() {
            document.querySelectorAll('.key').forEach(key => {
                key.classList.remove('correct', 'present', 'absent');
            });
        }

        window.addEventListener('keydown', (e) => {
            handleKeyPress(e.key.toLowerCase());
        });

        document.querySelectorAll('.key').forEach(key => {
            key.addEventListener('click', () => {
                const keyValue = key.getAttribute('data-key');
                handleKeyPress(keyValue);
            });
        });

        const modeToggleBtn = document.getElementById('modeToggle');
        modeToggleBtn.addEventListener('click', (e) => {
            isSixLetterMode = !isSixLetterMode;
            initGame();
            modeToggleBtn.blur(); 
        });

        initGame();
    </script>
</body>
</html>
